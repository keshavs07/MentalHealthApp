<!DOCTYPE html>
<html>
<head>
    <title>Mental Health AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h2 class="text-center">🧠 Mental Health Assistant</h2>

    <form method="POST" class="d-flex mt-4">
        <input type="text" name="text" class="form-control me-2" placeholder="How are you feeling?" required>
        <button class="btn btn-primary">Send</button>
    </form>

    <button onclick="startVoice()" class="btn btn-success mt-3">🎤 Voice</button>

    <div class="chat-box mt-4 p-3">
        <p><b>You:</b> {{ text }}</p>
        <p><b>Sentiment:</b> {{ sentiment }}</p>
        <p><b>Emotion:</b> {{ emotion }}</p>
        <p><b>Bot:</b> {{ response }}</p>
    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
